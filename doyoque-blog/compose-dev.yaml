services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      network: host
    image: doyoque/nginx:alpine
    container_name: doyoque-nginx
    restart: unless-stopped
    tty: true
    working_dir: /app
    depends_on:
      - blog
    volumes:
      - ./blog/:/app
    ports:
      - "8000:80"
    networks:
      - doyoque-network

  db:
    image: mysql
    command: mysqld --default-authentication-plugin=mysql_native_password
    container_name: doyoque-db
    restart: unless-stopped
    tty: true
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - doyoque-db:/var/lib/mysql
    networks:
      - doyoque-network

  phpmyadmin:
    image: phpmyadmin
    container_name: doyoque-phpmyadmin
    restart: unless-stopped
    tty: true
    ports:
      - "8001:80"
    environment:
      - PMA_HOST=db
    networks:
      - doyoque-network
    depends_on:
      - db

  blog:
    build:
      context: ./blog
      dockerfile: Dockerfile
      network: host
    image: doyoque/php-8.1-fpm:alpine
    container_name: doyoque-blog
    restart: unless-stopped
    tty: true
    working_dir: /app
    volumes:
      - ./blog/:/app
    networks:
      - doyoque-network
    depends_on:
      - db

  redis:
    image: redis:alpine
    container_name: doyoque-redis
    restart: unless-stopped
    tty: true
    networks:
      - doyoque-network
    volumes:
      - doyoque-redis:/data
    depends_on:
      - db

  echo:
    build:
      context: ./echo
      dockerfile: Dockerfile
      network: host
    image: doyoque/node-14.16:alpine
    container_name: doyoque-echo
    restart: unless-stopped
    tty: true
    depends_on:
      - blog
      - redis
    ports:
      - "6001:6001"
    networks:
      - doyoque-network
    volumes:
      - doyoque-echo:/app

networks:
  doyoque-network:
    driver: bridge

volumes:
  doyoque-db:
    driver: local
  doyoque-echo:
    driver: local
  doyoque-redis:
    driver: local
